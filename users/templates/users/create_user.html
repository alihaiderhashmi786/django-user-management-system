<!DOCTYPE html>
<html>
<head>
    <title>User Management System</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:linear-gradient(135deg,#4facfe,#00f2fe);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .card{
        width:420px;
        background:white;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 30px rgba(0,0,0,.2);
    }

    h1{
        text-align:center;
        color:#2c3e50;
        margin-bottom:25px;
    }

    label{
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        margin:8px 0 18px;
        border:1px solid #ccc;
        border-radius:8px;
    }

    .btn{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        color:white;
        cursor:pointer;
        font-size:16px;
        transition:.3s;
    }

    .create{
        background:#27ae60;
    }

    .show{
        background:#3498db;
        margin-top:12px;
    }

    .btn:hover{
        transform:scale(1.03);
    }

    </style>

</head>

<body>

<div class="card">

<h1>👤 User Management</h1>

<form method="POST">

{% csrf_token %}

<label>Name</label>

<input type="text" name="name" placeholder="Enter Name" required>

<label>Age</label>

<input type="number" name="age" placeholder="Enter Age" required>

<button class="btn create" type="submit">
Create User
</button>

</form>

<a href="{% url 'show_users' %}">
<button class="btn show" type="button">
📋 Show Users
</button>
</a>

</div>

</body>
</html>
