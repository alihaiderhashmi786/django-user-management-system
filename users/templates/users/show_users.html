<!DOCTYPE html>
<html>

<head>

<title>All Users</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eef5ff;
padding:40px;
}

.container{

width:80%;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);

}

h1{

text-align:center;
margin-bottom:25px;
color:#2c3e50;

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

input{

padding:10px;
width:220px;
border-radius:8px;
border:1px solid gray;

}

button{

padding:10px 18px;
border:none;
border-radius:8px;
background:#3498db;
color:white;
cursor:pointer;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th{

background:#3498db;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;
border-bottom:1px solid #ddd;

}

tr:hover{

background:#f5f5f5;

}

.back{

display:inline-block;
margin-top:20px;
background:#27ae60;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<h1>📋 Registered Users</h1>

<div class="top">

<form method="POST">

{% csrf_token %}

<input
type="number"
name="age"
placeholder="Minimum Age"
required>

<button type="submit">

Filter

</button>

</form>

<h3>Total Users : {{ users|length }}</h3>

</div>

<table>

<tr>

<th>#</th>

<th>Name</th>

<th>Age</th>

</tr>

{% for user in users %}

<tr>

<td>{{ forloop.counter }}</td>

<td>{{ user.name }}</td>

<td>{{ user.age }}</td>

</tr>

{% empty %}

<tr>

<td colspan="3">

No Users Found 😔

</td>

</tr>

{% endfor %}

</table>

<a href="{% url 'create_user' %}" class="back">

⬅ Back

</a>

</div>

</body>

</html>
